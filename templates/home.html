<!DOCTYPE html>
<html>
<head>

<title>Smart Grievance Portal</title>

<style>

body{
    font-family:Arial;
    background:linear-gradient(
        135deg,
        #ff9933,
        white,
        #138808
    );

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{

    width:500px;

    background:white;

    padding:30px;

    border-radius:15px;

    text-align:center;

    box-shadow:0 0 15px #ccc;
}

input{

    width:100%;

    padding:12px;

    margin-top:15px;
}

button{

    width:100%;

    padding:12px;

    margin-top:15px;

    border:none;

    background:#138808;

    color:white;

    border-radius:8px;
}

.link{

    margin-top:15px;
}

a{
    text-decoration:none;
}

footer{
    margin-top:40px;
    background:#061a40;
    color:white;
    text-align:center;
    padding:18px;
    border-top:4px solid #ff9933;
    font-size:15px;
}

footer p{
    margin:6px 0;
}

body.dark-mode footer{
    background:#000814;
    border-top:4px solid #138808;
}

</style>

</head>

<body>

<div class="card">

<h1>
🇮🇳 Smart Grievance Portal
</h1>

<p>
Track your complaint instantly
</p>

<form action="/track" method="POST">

<input
type="text"
name="tracking_id"
placeholder="Enter Tracking ID"
required>

<button type="submit">

🔍 Track Complaint

</button>

</form>

<div class="link">

<a href="/login">

Login

</a>

|

<a href="/register">

Register

</a>

</div>

</div>

<footer>

<p><strong>🇮🇳 AI Based Smart Grievance System</strong></p>

<p>Developed by <strong>Suraj Kumar Paswan</strong></p>

<p>BCA Final Year Project 2026</p>

<p>CIMAGE Group of Institutions, Patna</p>

<p>© 2026 All Rights Reserved</p>

</footer>

</body>
</html>
