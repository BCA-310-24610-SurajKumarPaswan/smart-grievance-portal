<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Grievance Portal - Government of India</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
        
            background: #f4f7fb;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 🇮🇳 Tiranga Top Border */
        .tiranga-bar {
            height: 6px;
            background: linear-gradient(90deg, #FF9933 33%, white 33%, white 66%, #138808 66%);
        }

        /* 🇮🇳 Ashoka Chakra Background */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            background: url("https://upload.wikimedia.org/wikipedia/commons/1/17/Ashoka_Chakra.svg") no-repeat center;
            background-size: contain;
            opacity: 0.05;
            transform: translate(-50%, -50%);
            animation: rotateChakra 40s linear infinite;
            z-index: -1;
        }

        @keyframes rotateChakra {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .navbar {
            background: #0d1b2a;
        }

        .card {
            border-radius: 18px;
            border: none;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
        }

        .btn-primary, .btn-success {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<!-- 🇮🇳 Tiranga Bar -->
<div class="tiranga-bar"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand" href="/">🇮🇳 Smart Grievance Portal</a>

    <div class="ms-auto">
        {% if session.get('user') %}
            <span class="text-white me-3">
                Welcome {{ session.get('user') }}
            </span>
            <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">
                Logout
            </a>
        {% endif %}
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-4 mb-5">

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-info alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

<!-- ✅ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ Voice JS (VERY IMPORTANT) -->
<script src="{{ url_for('static', filename='js/voice_fill.js') }}"></script>

</body>
<button id="themeToggle" class="theme-btn">
🌙 Dark Mode
</button>
</html>
