{% extends "base.html" %}

{% block content %}
<div class="container mt-5">

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-primary text-white rounded-top-4">
            <h4 class="mb-0">📝 Submit New Complaint</h4>
        </div>

        <div class="card-body p-4">

            <!-- 🎤 Voice Button -->
            <button type="button" onclick="startVoiceFill()" class="btn btn-success mb-3">
                🎤 Speak Complaint
            </button>

            <form method="POST">

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Complaint Title</label>
                    <input type="text"
                           name="title"
                           id="title"
                           class="form-control"
                           placeholder="Example: Internet not working"
                           required>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Detailed Description</label>
                    <textarea name="description"
                              id="description"
                              class="form-control"
                              rows="4"
                              placeholder="Explain your issue clearly..."
                              required></textarea>
                </div>

                <!-- Category -->
                <div class="mb-3">
                    <label class="form-label fw-bold">Category</label>
                    <select name="category"
                            id="category"
                            class="form-select">
                        <option value="Electricity">Electricity</option>
                        <option value="Water">Water</option>
                        <option value="Road">Road</option>
                        <option value="Health">Health</option>
                        <option value="Corruption">Corruption</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Priority -->
                <div class="mb-4">
                    <label class="form-label fw-bold">Priority Level</label>
                    <select name="priority"
                            id="priority"
                            class="form-select">
                        <option value="Low">🟢 Low</option>
                        <option value="Medium" selected>🟡 Medium</option>
                        <option value="High">🔴 High</option>
                    </select>
                </div>

                <!-- Buttons -->
                <div class="d-grid gap-2">
                    <button type="submit"
                            class="btn btn-success btn-lg rounded-3">
                        🚀 Submit Complaint
                    </button>

                    <a href="/dashboard"
                       class="btn btn-secondary rounded-3">
                        ← Back to Dashboard
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- ✅ IMPORTANT: JS FILE LINK -->
<script src="{{ url_for('static', filename='js/voice_fill.js') }}"></script>

{% endblock %}
