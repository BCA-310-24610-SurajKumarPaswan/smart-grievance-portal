<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #ff9933,
        white,
        #138808
    );
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* CHAKRA */
.chakra{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:500px;
    opacity:0.06;
    animation:spin 40s linear infinite;
    z-index:-1;
}

@keyframes spin{
    from{
        transform:translate(-50%,-50%) rotate(0deg);
    }
    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }
}

/* CARD */
.card{
    width:350px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 25px rgba(0,0,0,0.2);
}

/* HEADING */
.heading{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-bottom:25px;

    background:linear-gradient(
        to right,
        #ff6a00,
        #138808
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* INPUT */
.input-box{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    margin-top:18px;
    border:none;
    border-radius:10px;
    background:#138808;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
    color:#000814;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<img src="{{ url_for('static', filename='ashoka.png') }}" class="chakra">

<div class="card">

<div class="heading">
Forgot Password
</div>

<form method="POST">

<input
type="email"
name="email"
placeholder="Enter your email"
class="input-box"
required>

<input
type="password"
name="new_password"
placeholder="Enter new password"
class="input-box"
required>

<button type="submit" class="btn">
Reset Password
</button>

</form>

<a href="{{ url_for('login') }}" class="back">
← Back to Login
</a>

</div>

</body>
</html>
