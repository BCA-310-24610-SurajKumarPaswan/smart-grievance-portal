<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Complaint</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
        135deg,
        #ff9933,
        #ffffff,
        #138808
    );
    overflow-x:hidden;
}

/* Ashoka Chakra */
.chakra{
    position:fixed;
    top:50%;
    left:50%;
    width:500px;
    opacity:0.05;
    transform:translate(-50%,-50%);
    animation:spin 40s linear infinite;
    z-index:-1;
}

@keyframes spin{
    from{
        transform:translate(-50%,-50%) rotate(0deg);
    }
    to{
        transform:translate(-50%,-50%) rotate(360deg);
    }
}

/* Navbar */

.navbar{
    background:#001d3d;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

/* Container */

.container{
    min-height:calc(100vh - 70px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

/* Card */

.card{
    width:100%;
    max-width:850px;

    background:rgba(255,255,255,0.25);

    backdrop-filter:blur(12px);

    border-radius:25px;

    padding:30px;

    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* Heading */

.heading{
    text-align:center;

    font-size:42px;

    font-weight:bold;

    margin-bottom:25px;

    background:linear-gradient(
        to right,
        #ff6a00,
        #138808
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* Labels */

label{
    display:block;
    font-size:16px;
    font-weight:bold;
    margin-bottom:8px;
    margin-top:15px;
}

/* Inputs */

.input-box{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:15px;
    background:white;
    outline:none;
}

.input-box:focus{
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

/* Textarea */

textarea{
    resize:none;
    height:140px;
}

/* Buttons */

.btn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-top:15px;
}

.btn:hover{
    transform:translateY(-2px);
}

.voice-btn{
    background:#ff6a00;
}

.submit-btn{
    background:#138808;
}

/* Mobile */

@media(max-width:768px){

.heading{
    font-size:28px;
}

.card{
    padding:20px;
}

}

</style>
</head>

<body>

<img src="{{ url_for('static', filename='ashoka.png') }}" class="chakra">

<div class="navbar">

<div class="logo">
🇮🇳 Smart Grievance Portal
</div>

<div>
Welcome {{ session['user'] }}
</div>

</div>

<div class="container">

<div class="card">

<div class="heading">
Submit Complaint
</div>

<form method="POST" enctype="multipart/form-data">

<label>Complaint Title</label>

<input
type="text"
name="title"
class="input-box"
placeholder="Enter complaint title"      
required>

<label>Description</label>

<textarea
id="description"
name="description"
class="input-box"
placeholder="Describe your complaint..."
required></textarea>

<label>Upload Evidence (Image / Video / PDF)</label>

<input
type="file"
name="evidence"
class="input-box"
accept=".jpg,.jpeg,.png,.pdf,.mp4">

<button
type="button"
class="btn voice-btn"
onclick="startVoice()">

🎤 Voice Input

</button>

<label>Location</label>

<input
type="text"
name="location"
class="input-box"
placeholder="Village / Area / City"
required>

<label>Category</label>

<select
name="category"
class="input-box">

<option>Electricity</option>
<option>Water</option>
<option>Road</option>
<option>Health</option>
<option>Corruption</option>
<option>Other</option>

</select>

<label>Priority</label>

<select
name="priority"
class="input-box">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<button
type="submit"
class="btn submit-btn">

Submit Complaint

</button>

</form>

</div>

</div>

<script>

function startVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Voice input not supported");
return;
}

const recognition = new webkitSpeechRecognition();

recognition.lang = "en-IN";

recognition.onresult = function(event){

document.getElementById("description").value =
event.results[0][0].transcript;

};

recognition.start();

}

</script>
<div id="loader" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.8);
z-index:9999;
justify-content:center;
align-items:center;
">

<div style="
width:70px;
height:70px;
border:8px solid #ddd;
border-top:8px solid #138808;
border-radius:50%;
animation:spin 1s linear infinite;
"></div>

</div>

<style>
@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
</style>

<script>

document.querySelector("form").addEventListener("submit",function(){

document.getElementById("loader").style.display="flex";

});

</script>

</body>
</html>
